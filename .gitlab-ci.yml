image: node:20

cache:
  paths:
    - node_modules/

stages:
  - test
  - build

test:
  stage: test
  script:
    - npm ci
    - CI=true npm test -- --watchAll=false --testTimeout=30000
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage/
    expire_in: 7 days

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - build/
    expire_in: 1 day
  only:
    - main
    - merge_requests
